<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - WhatsApp Warmer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar sederhana -->
    <aside class="w-64 bg-white shadow-md p-5 hidden md:block">
      <h2 class="text-xl font-bold text-indigo-600 mb-6">WarmerSpark</h2>
      <nav>
        <a href="dashboard.html" class="block py-2 px-4 bg-indigo-100 text-indigo-700 rounded">Dashboard</a>
        <a href="#" id="logoutBtn" class="block py-2 px-4 text-gray-600 hover:bg-gray-100 rounded mt-2">Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 overflow-auto">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Dashboard Pemanasan</h1>
        <button id="addAccountBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
          <i class="fas fa-plus mr-2"></i>Tambah Akun
        </button>
      </div>

      <!-- Daftar Akun -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="accountsContainer">
        <div class="text-center py-10 text-gray-500 col-span-full">Memuat akun...</div>
      </div>

      <!-- Log Aktivitas -->
      <div class="mt-8 bg-gray-900 text-white rounded-lg p-4 font-mono text-sm h-64 overflow-y-auto" id="logContainer">
        <div class="text-gray-400">[Sistem] Menunggu aktivitas...</div>
      </div>
    </main>
  </div>

  <!-- Script -->
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
